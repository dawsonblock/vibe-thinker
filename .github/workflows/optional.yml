name: Optional
on:
  workflow_dispatch:
  pull_request:
jobs:
  optional:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install -e ".[dev,test,logic,embeddings,federation,web,nli]"
      - run: pytest -m "logic or embeddings or federation or web or nli or sandbox"
