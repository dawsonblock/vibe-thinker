name: Optional
on:
  workflow_dispatch:
  pull_request:
jobs:
  optional:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install -e ".[dev,test,logic,embeddings,federation,web,nli]"
      # Optional-dep tests (logic/embeddings/federation/web/nli). Sandbox
      # tests need the sandbox extra + Docker — run via test_docker.sh.
      - run: pytest -m "logic or embeddings or federation or web or nli"

  sandbox:
    name: Optional (Docker sandbox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install -e ".[dev,test,sandbox]"
      # Build the sandbox image so the real enforcement tests have it.
      - run: docker build -t vibe-thinker-sandbox:latest -f sandbox/Dockerfile .
      # Real Docker network enforcement tests (require Docker daemon).
      - run: bash scripts/test_docker.sh
