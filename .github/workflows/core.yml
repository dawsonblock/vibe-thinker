name: Core
on:
  push:
  pull_request:
jobs:
  core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip setuptools wheel build
      - run: python -m pip install -e ".[dev,test]"
      - run: python -m compileall -q .
      - run: pytest -m "not logic and not embeddings and not federation and not web and not sandbox and not integration"
      - run: python -m build
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: vibe-thinker --help
