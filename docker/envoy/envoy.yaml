# =============================================================================
# Envoy sidecar config — TRANSPARENT SNI-aware egress proxy (experimental)
# =============================================================================
# WARNING: This config is for TRANSPARENT SNI routing, NOT an HTTP_PROXY.
# It expects the client connection to be redirected to Envoy preserving the
# original destination IP (e.g. via iptables TPROXY). It does NOT implement
# HTTP CONNECT, so it will NOT work when the sandbox is configured with
# HTTP_PROXY=envoy:8888 / HTTPS_PROXY=envoy:8888.
#
# For the docker-compose stack, use the Python SNI proxy (sni-proxy service,
# sandbox/sni_proxy.py) which correctly implements HTTP/HTTPS CONNECT proxying.
# This Envoy config is kept for the standalone --envoy-sidecar / transparent-
# routing path only.
#
# Generated to match the structure produced by sandbox/envoy_sidecar.py
# `generate_envoy_config()` (listen_port=8888, admin_port=9901).
#
#   Listener: 0.0.0.0:8888  (envoy_sidecar.py:63 listen_port default 8888)
#   Admin:    127.0.0.1:9901 (envoy_sidecar.py:65 admin_port default 9901)
#
# This is a MINIMAL config with an example allow-list (pypi.org). The
# orchestrator's --envoy-sidecar flag normally GENERATES this config at runtime
# from --network-allowlist (sandbox/envoy_sidecar.py:61 generate_envoy_config).
#
# To tighten egress, edit the `exact_match_map` below to list the domains your
# sandbox must reach. Domains not in the map hit `on_no_match` -> deny_sinkhole
# (connection closed). Wildcards use suffix match (e.g. ".pythonhosted.org").
# =============================================================================

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901
  access_log_path: /dev/stdout

static_resources:
  listeners:
    - name: egress_sni_proxy
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8888
      listener_filters:
        - name: envoy.filters.listener.tls_inspector
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
      filter_chains:
        - filter_chain_match:
            server_names: ["pypi.org"]
          filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: allow_pypi.org
                cluster: dynamic_upstream
        - filter_chain_match:
            server_names: ["files.pythonhosted.org"]
          filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: allow_files.pythonhosted.org
                cluster: dynamic_upstream
        # Default: deny (no SNI match -> close connection via sinkhole).
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: deny
                cluster: deny_sinkhole

  clusters:
    # dynamic_upstream: tunnels allowed connections to the resolved upstream.
    # ORIGINAL_DST connects to whatever destination the client requested (the
    # SNI-matched host). This matches envoy_sidecar.py:235 when no
    # dns_resolver is set.
    - name: dynamic_upstream
      type: ORIGINAL_DST
      lb_policy: CLUSTER_PROVIDED
      connect_timeout: 5s
    # deny_sinkhole: connects to a non-routable address, causing immediate
    # close. Matches envoy_sidecar.py:282-304.
    - name: deny_sinkhole
      type: STATIC
      connect_timeout: 1s
      load_assignment:
        cluster_name: deny_sinkhole
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 1

layered_runtime:
  layers:
    - name: static
      static_layer:
        envoy.reloadable_features.no_extension_lookup_by_name: false
