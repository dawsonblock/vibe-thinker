[package]
name = "ruvllm_py"
version = "0.1.0"
edition = "2021"
description = "Python bindings for the RuvLLM Rust inference engine with TurboQuant KV cache compression"
license = "MIT"
repository = "https://github.com/ruvnet/ruvllm"

[lib]
name = "ruvllm_py"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module", "abi3-py38"] }

# RuvLLM inference backend (v1.2): the ruvllm 2.3 crate is published on
# crates.io. The real inference path (CandleBackend + candle-core) is
# gated behind the "candle" feature so this crate compiles as a stub
# without it. Enable with:
#   cargo build --release --features candle        (CPU)
#   cargo build --release --features inference-metal   (Apple Silicon)
ruvllm = { version = "2.3", default-features = false, features = ["async-runtime"] }

# Security patches (v0.4.1): override vulnerable/unsound transitive deps
# that ruvllm may pull in when the candle feature is enabled.
# - rustls-webpki 0.101.x: 3 CVEs (CRL panic, cert name constraint bypass).
# - lru 0.12.5: unsound (Stacked Borrows violation in IterMut).
# These are no-ops unless the vulnerable versions are actually resolved.
[patch.crates-io]
# Mirror the working patch config from rust/probes/ruvllm_exo_probe.
# See that probe's Cargo.toml for the precise patch versions.

[features]
default = []
# Real inference via candle-core (CPU). Enables CandleBackend::load_gguf
# + generate(). Without this, Engine.complete() returns a stub response.
candle = ["ruvllm/candle"]
# Apple Silicon Metal acceleration (implies candle).
inference-metal = ["ruvllm/inference-metal"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
